variables:
  LIBCLANG_PATH: "/usr/lib/llvm-14/lib"
  BINDGEN_EXTRA_CLANG_ARGS: "-I/usr/include"
  PKG_CONFIG_PATH: "/usr/lib/x86_64-linux-gnu/pkgconfig"
  APP_IMAGE: "$HARBOR_HOST/$HARBOR_PROJECT/zenth-front"

stages:
  - build
  - sign
  - deploy

# ── Build ─────────────────────────────────────────────────────────────────────
build:
  stage: build
  image: rust:1.75-bookworm

  before_script:
    - apt-get update -qq
    - apt-get install -y --no-install-recommends \
        curl wget build-essential pkg-config \
        libgtk-3-dev \
        libwebkit2gtk-4.1-dev \
        libjavascriptcoregtk-4.1-dev \
        libayatana-appindicator3-dev \
        libsoup-3.0-dev \
        xdg-utils \
        libclang-dev llvm-dev

    - ln -sf /usr/lib/x86_64-linux-gnu/pkgconfig/webkit2gtk-4.1.pc
            /usr/lib/x86_64-linux-gnu/pkgconfig/webkit2gtk-4.0.pc
    - ln -sf /usr/lib/x86_64-linux-gnu/pkgconfig/javascriptcoregtk-4.1.pc
            /usr/lib/x86_64-linux-gnu/pkgconfig/javascriptcoregtk-4.0.pc

    - curl -fsSL https://bun.sh/install | bash
    - export PATH="$HOME/.bun/bin:$PATH"
    - bun install

  script:
    - APP_VERSION=$(grep '^version' src-tauri/Cargo.toml | head -1 | cut -d'"' -f2)
    - echo "Building Tauri v${APP_VERSION}..."
    - bun run tauri build

    - mkdir -p dist
    - find src-tauri/target/release/bundle -type f \( -name "*.deb" -o -name "*.AppImage" \) -exec cp {} dist/ \;
    - ls -lh dist

  artifacts:
    paths:
      - dist/
    expire_in: 1 week

  only:
    - main
    - develop

# ── Sign ──────────────────────────────────────────────────────────────────────
sign:
  stage: sign
  needs: [build]
  image: debian:bookworm-slim

  before_script:
    - apt-get update -qq
    - apt-get install -y --no-install-recommends openssl python3

  script:
    - APP_VERSION=$(python3 -c "import json; print(json.load(open('src-tauri/tauri.conf.json'))['version'])")
    - echo "Signing release v${APP_VERSION}..."

    - echo "$ED25519_PRIVATE_KEY" | base64 -d > /tmp/ed25519_private.pem
    - chmod 600 /tmp/ed25519_private.pem

    - bash scripts/sign_release.sh "$APP_VERSION" /tmp/ed25519_private.pem dist/

    - rm -f /tmp/ed25519_private.pem

  artifacts:
    paths:
      - dist/
    expire_in: 1 week

  only:
    - main

# ── Deploy ────────────────────────────────────────────────────────────────────
deploy:
  stage: deploy
  needs: [sign]
  image: debian:bookworm-slim

  before_script:
    - apt-get update -qq
    - apt-get install -y --no-install-recommends curl ca-certificates python3

    # Installe ORAS (OCI Registry As Storage) pour push vers Harbor
    - ORAS_VERSION="1.2.0"
    - curl -fsSL "https://github.com/oras-project/oras/releases/download/v${ORAS_VERSION}/oras_${ORAS_VERSION}_linux_amd64.tar.gz" | tar -xz -C /usr/local/bin oras
    - chmod +x /usr/local/bin/oras

    # Authentification Harbor
    - echo "$HARBOR_PASSWORD" | oras login "$HARBOR_HOST" --username "$HARBOR_USERNAME" --password-stdin

  script:
    - APP_VERSION=$(python3 -c "import json; print(json.load(open('src-tauri/tauri.conf.json'))['version'])")
    - echo "Deploying v${APP_VERSION} → ${HARBOR_HOST}/${HARBOR_PROJECT}/zenth-front..."

    # Push les artifacts vers Harbor (OCI artifact)
    - |
      oras push "$HARBOR_OCI/$HARBOR_PROJECT/zenth-front:$APP_VERSION" \
        --artifact-type "application/vnd.zenth.release" \
        dist/manifest.json:application/vnd.zenth.manifest+json \
        $(find dist/ -name "*.deb"      -printf '%p:application/x-debian-package ') \
        $(find dist/ -name "*.AppImage" -printf '%p:application/x-appimage ')

    # Tag latest
    - |
      oras tag "$HARBOR_OCI/$HARBOR_PROJECT/zenth-front:$APP_VERSION" \
               "$HARBOR_OCI/$HARBOR_PROJECT/zenth-front:latest"

    - echo "Artifacts disponibles sur ${HARBOR_URL}/harbor/projects/${HARBOR_PROJECT}/repositories/zenth-front"

  environment:
    name: production

  only:
    - main
